services:
  app:
    build:
      context: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://postgres:5432/libre_media_manager
      DATABASE_USERNAME: libre_media_manager
      DATABASE_PASSWORD: libre_media_manager
    ports:
      - "8080:8080"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: libre_media_manager
      POSTGRES_USER: libre_media_manager
      POSTGRES_PASSWORD: libre_media_manager
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U libre_media_manager -d libre_media_manager"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
